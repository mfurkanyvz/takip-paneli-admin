services:
  - type: web
    name: takip-paneli
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: UPLOAD_LIMIT_MB
        value: "100"
      - key: DATA_FILE
        value: ./data/db.json
      - key: UPLOAD_DIR
        value: ./uploads
